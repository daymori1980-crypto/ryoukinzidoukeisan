<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>デイサービス料金計算</title>
</head>

<body>

<div style="max-width:420px;padding:16px;border:1px solid #ccc;border-radius:10px;font-family:sans-serif;">
  <h3>デイサービス料金 簡易計算</h3>

  <!-- 要介護度 -->
  <label>要介護度</label><br>
  <select id="level">
    <option value="1798">要支援1</option>
    <option value="3621">要支援2</option>
    <option value="658">要介護1</option>
    <option value="777">要介護2</option>
    <option value="900">要介護3</option>
    <option value="1023">要介護4</option>
    <option value="1148">要介護5</option>
  </select>

  <br><br>

  <label>利用日数</label><br>
  <select id="days"></select>

  <br><br>

  <label>入浴回数</label><br>
  <select id="bath"></select>

  <br><br>

  <label>食事回数</label><br>
  <select id="meal"></select>

  <br><br>

  <label>負担割合</label><br>
  <select id="rate">
    <option value="0.1">1割</option>
    <option value="0.2">2割</option>
    <option value="0.3">3割</option>
  </select>

  <br><br>

  <button onclick="calc()">計算する</button>

  <hr>

  <div id="result"></div>
  <p style="font-size:12px;color:#666;margin-top:15px;border-top:1px solid #ddd;padding-top:10px;">
※7時間以上利用(送迎有)で計算しています。<br>
※おおよその金額になります。ご参考としてください。
</p>
</div>

<script>
// 1〜31回生成
function fill(id){
  const s=document.getElementById(id);
  for(let i=1;i<=31;i++){
    const o=document.createElement("option");
    o.value=i;
    o.text=i+"回";
    s.appendChild(o);
  }
}
fill("days");
fill("bath");
fill("meal");

function calc(){
  const levelText = document.getElementById("level").selectedIndex;
  const levelValue = Number(document.getElementById("level").value);

  const days = Number(document.getElementById("days").value);
  const bath = Number(document.getElementById("bath").value);
  const meal = Number(document.getElementById("meal").value);
  const rate = Number(document.getElementById("rate").value);

  let base = 0;

  // ■ 要支援かどうか判定（0と1が要支援）
  if(levelText === 0 || levelText === 1){
    // 月額固定
    base = levelValue;
  }else{
    // 要介護は日額×日数
    base = levelValue * days;
  }

  // ■ 入浴加算（1回40円、負担割合対象）
  const bathAdd = bath * 40;

  // ■ 食事（1食640円、全額自己負担）
  const mealCost = meal * 640;

  // ■ 介護保険対象合計
  const careTotal = base + bathAdd;

  // ■ 自己負担（割合適用）
  const userCare = Math.round(careTotal * rate);

  // ■ 最終支払額（食事は別）
  const totalPay = userCare + mealCost;

  document.getElementById("result").innerHTML =
    "【介護保険対象】<br>" +
    "合計：" + careTotal + "円<br>" +
    "自己負担：" + userCare + "円<br><br>" +

    "【食事代（全額）】<br>" +
    mealCost + "円<br><br>" +

    "<b>お支払い合計：" + totalPay + "円</b>";
}
</script>

</body>
</html>
