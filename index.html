<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>デイサービス料金計算</title>
</head>

<body style="margin:0; background:#f5f5f5;">

<div style="
  max-width:420px;
  padding:16px;
  border:1px solid #ccc;
  border-radius:10px;
  font-family:sans-serif;
  margin:40px auto;
  background:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
">

  <h3>デイサービス料金 簡易計算</h3>

  <label>要介護度</label><br>
  <select id="level">
    <option value="17980">要支援1</option>
    <option value="36210">要支援2</option>
    <option value="6580">要介護1</option>
    <option value="7770">要介護2</option>
    <option value="9000">要介護3</option>
    <option value="10230">要介護4</option>
    <option value="11480">要介護5</option>
  </select>

  <br><br>

  <label>利用日数</label><br>
  <select id="days"></select>

  <br><br>

  <label>入浴回数</label><br>
  <select id="bath"></select>

  <br><br>

  <label>食事回数</label><br>
  <select id="meal"></select>

  <br><br>

  <label>負担割合</label><br>
  <select id="rate">
    <option value="0.1">1割</option>
    <option value="0.2">2割</option>
    <option value="0.3">3割</option>
  </select>

  <hr>

  <div id="result">条件を選択すると自動計算されます</div>

  <p style="font-size:12px;color:#666;margin-top:15px;border-top:1px solid #ddd;padding-top:10px;">
※7時間以上利用(送迎有)で計算しています。<br>
※地域単価10円で計算しています。<br>
※処遇改善加算9%を含みます。<br>
※おおよその金額です。
</p>
</div>

<script>
const UNIT_PRICE = 10;
const IMPROVEMENT_RATE = 0.09; // 9%

function fill(id){
  const s=document.getElementById(id);
  for(let i=1;i<=31;i++){
    const o=document.createElement("option");
    o.value=i;
    o.text=i+"回";
    s.appendChild(o);
  }
}
fill("days");
fill("bath");
fill("meal");

function calc(){

  const levelSelect = document.getElementById("level");
  const levelText = levelSelect.selectedOptions[0].text;
  const levelValue = Number(levelSelect.value);

  let days = Number(document.getElementById("days").value);
  let bath = Number(document.getElementById("bath").value);
  let meal = Number(document.getElementById("meal").value);
  const rate = Number(document.getElementById("rate").value);

  bath = Math.min(bath, days);
  meal = Math.min(meal, days);

  const isSupport = ["要支援1","要支援2"].includes(levelText);

  let base = 0;

  if(isSupport){
    base = levelValue;
  }else{
    base = levelValue * days;
  }

  // 入浴
  const bathAdd = bath * 40 * UNIT_PRICE;

  // 介護保険対象（加算前）
  const careTotal = base + bathAdd;

  // ★ 処遇改善加算
  const improvement = Math.round(careTotal * IMPROVEMENT_RATE);

  // 加算込み
  const careTotalWithAdd = careTotal + improvement;

  // 自己負担
  const userCare = Math.round(careTotalWithAdd * rate);

  // 食費
  const mealCost = meal * 640;

  // 総額
  const totalPay = userCare + mealCost;

  document.getElementById("result").innerHTML =
    "【介護保険対象】<br>" +
    "基本＋加算：" + careTotal.toLocaleString() + "円<br>" +
    "処遇改善加算：" + improvement.toLocaleString() + "円<br>" +
    "合計：" + careTotalWithAdd.toLocaleString() + "円<br>" +
    "自己負担：" + userCare.toLocaleString() + "円<br><br>" +

    "【食費（全額自己負担）】<br>" +
    mealCost.toLocaleString() + "円<br><br>" +

    "<b>お支払い合計：約" + totalPay.toLocaleString() + "円</b>";
}

document.querySelectorAll("select").forEach(s=>{
  s.addEventListener("change", calc);
});

calc();

</script>

</body>
</html>
